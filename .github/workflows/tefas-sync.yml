# TEFAS fon fiyatları — Portfolio sync’ten ayrı (WAF / IP riski için).
# GitHub Actions cron UTC’dir: aşağıdaki ifade Europe/Istanbul 08:00–13:00 arası saatte bir tetiklenir.
name: TEFAS sync

on:
  schedule:
    # UTC 05–10 → TSİ 08:00, 09:00, …, 13:00 (her gün)
    - cron: "0 5,6,7,8,9,10 * * *"
  workflow_dispatch:

concurrency:
  group: tefas-sync
  cancel-in-progress: false

jobs:
  sync-tefas:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Export env from secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> $GITHUB_ENV
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> $GITHUB_ENV
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> $GITHUB_ENV

      - name: Sync TEFAS fonları
        run: node scripts/sync-tefas-funds.js
