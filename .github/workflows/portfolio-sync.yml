# 15 dakikada bir çalışması hedefleniyor. GitHub Actions zamanlanmış işleri
# yük nedeniyle geciktirebiliyor (2–3 saate kadar). Garanti için dış cron
# kullanın: docs/SYNC-SCHEDULE.md
name: Portfolio sync

on:
  schedule:
    # Saat başı (0,15,30,45) yerine 5,20,35,50 — GitHub'da o saatler daha az yüklü
    - cron: "5,20,35,50 * * * *"
  workflow_dispatch:

concurrency:
  group: portfolio-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Export env from secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> $GITHUB_ENV
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> $GITHUB_ENV
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> $GITHUB_ENV

      - name: Sync crypto (CoinGecko)
        run: node scripts/sync-crypto-prices.js

      - name: Sync BIST (scrape)
        run: node scripts/sync-bist-scrape.js

      - name: Sync Döviz (doviz.dev)
        run: node scripts/sync-doviz-dev.js

      - name: Sync Emtia (scrape)
        run: node scripts/sync-emtia-scrape.js

      - name: Sync Kapalıçarşı Altın
        run: node scripts/sync-kapalicarsi-gold.js

      - name: Sync TEFAS Fonları
        run: node scripts/sync-tefas-funds.js

      - name: Sync Yurtdışı liste (S&P 500)
        run: node scripts/sync-yurtdisi-list.js

      - name: Sync Yurtdışı fiyat (Yahoo)
        run: node scripts/sync-yurtdisi-prices.js

      - name: Snapshot prices (grafik geçmişi)
        run: node scripts/snapshot-prices.js
