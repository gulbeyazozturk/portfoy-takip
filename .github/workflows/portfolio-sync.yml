# Senkron: kripto, BIST scrape, döviz, emtia, altın, yurtdışı holdings, snapshot.
#
# Zamanlama GitHub cron ile değil: Supabase pg_cron (~15 dk) → Edge dispatch-portfolio-sync
# → bu workflow workflow_dispatch ile tetiklenir. Dış servis alternatifi: docs/SYNC-SCHEDULE.md
name: Portfolio sync

on:
  workflow_dispatch:

concurrency:
  group: portfolio-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    # checkout/setup-node gibi JS action'ların Node 24 runtime kullanması (GitHub deprecation / 2026 geçişi)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TRUNCGIL_CONNECT_TIMEOUT_MS: "30000"
      TRUNCGIL_ALLOW_FAILURE: "1"
      BIST_SCRAPE_ALLOW_FAILURE: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          # v5 varsayılan önbelleği kapalı; zamanlanmış senkron için önceki davranışa yakın
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Export env from secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> $GITHUB_ENV
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> $GITHUB_ENV
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> $GITHUB_ENV

      - name: Sync crypto (CoinGecko)
        run: node scripts/sync-crypto-prices.js

      - name: Sync BIST (scrape)
        run: node scripts/sync-bist-scrape.js

      - name: Sync Döviz (doviz.dev)
        run: node scripts/sync-doviz-dev.js

      - name: Sync Emtia (scrape)
        run: node scripts/sync-emtia-scrape.js

      - name: Sync Kapalıçarşı Altın
        run: node scripts/sync-kapalicarsi-gold.js

      # TEFAS: GitHub IP engeli — Supabase Edge + pg_cron: docs/SUPABASE-TEFAS-EDGE.md

      - name: Sync ABD (yalnızca holdings)
        run: node scripts/sync-yurtdisi-prices.js --mode=holdings --batch=500 --delay=140

      - name: US support/resistance alerts
        env:
          US_SR_NEAR_PCT: "3"
          US_SR_TR_PREP_HOUR: "9"
          US_SR_TR_NOTIFY_START_HOUR: "9"
          US_SR_TR_NOTIFY_END_HOUR_EXCLUSIVE: "24"
          US_SR_LOOKBACK_DAYS: "120"
        run: node scripts/send-us-sr-alerts.js

      - name: Snapshot prices (grafik geçmişi)
        run: node scripts/snapshot-prices.js

      - name: Push %2+ daily gain alerts
        env:
          DAILY_GAIN_PUSH_THRESHOLD: "2"
          DAILY_FALL_PUSH_THRESHOLD: "-3"
          DAILY_GAIN_PUSH_LOCAL_START_HOUR: "9"
          DAILY_GAIN_PUSH_LOCAL_END_HOUR: "22"
          DAILY_SUMMARY_LOCAL_HOUR: "23"
        run: node scripts/send-daily-gain-push.js
