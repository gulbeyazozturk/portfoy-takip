# ABD (Yurtdışı) fiyat senkronu ayrı workflow:
# - Master listeyi günceller
# - 500'lük full batch fiyat çeker
# - Holdings'te eksik kalan fiyatları backfill eder
#
# Zamanlama GitHub cron ile değil: Supabase pg_cron (~15 dk) → Edge sync-abd-prices
# (ABD_PRICE_SOURCE=github_dispatch) → bu workflow workflow_dispatch ile tetiklenir.
name: ABD Sync

on:
  workflow_dispatch:

concurrency:
  group: us-sync
  cancel-in-progress: false

jobs:
  sync-us:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TRUNCGIL_CONNECT_TIMEOUT_MS: "30000"
      TRUNCGIL_ALLOW_FAILURE: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Export env from secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> $GITHUB_ENV
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> $GITHUB_ENV
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> $GITHUB_ENV

      - name: Sync Yurtdışı liste (S&P 500)
        run: node scripts/sync-yurtdisi-list.js

      - name: Sync Yurtdışı fiyat (Yahoo, rotating full batch 500)
        run: node scripts/sync-yurtdisi-prices.js --mode=full --batch=500 --cycle-window=500 --cycle-every-min=10 --delay=180

      - name: Backfill eksik Yurtdışı fiyatlar (holdings)
        run: node scripts/sync-yurtdisi-missing-prices.js --limit=160 --delay=140
