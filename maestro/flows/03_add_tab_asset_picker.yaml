# Senaryo 3 — Oturum AÇIKKEN: alt sekmeden "Ekle" → varlık türü seçim ekranı
# Önkoşul: Cihazda ZATEN giriş yapılmış test kullanıcısı (clearState KULLANMAYIN).
# İlk çalıştırmadan önce manuel giriş yapın VEYA ayrı bir login flow yazın.
